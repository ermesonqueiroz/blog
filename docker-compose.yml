services:
  site:
    image: docker.io/hugomods/hugo:base
    command: server -D --poll 700ms
    environment:
      - APP_ENV=development
    volumes:
      - "./site:/src"
      - "./site/public:/public"
    ports:
      - "1313:1313"
    depends_on:
      - api
    networks:
      - blog

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    working_dir: /var/www/html
    env_file: ./api/.env
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
    networks:
      - blog
    depends_on:
      - psql

  psql:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blog

volumes:
  postgres_data:

networks:
  blog:
